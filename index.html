    function getIconSVG(name, size = 18, strokeWidth = 2.5) {
      const template = iconSVGs[name] || iconSVGs.Wallet;
      return template.replace(/size/g, size).replace(/strokeWidth/g, strokeWidth);
    }

    const CAT_ICONS = {
      Income: 'TrendingUp',
      Savings: 'PiggyBank',
      Bills: 'ReceiptText',
      Debt: 'CreditCard',
      Expense: 'ShoppingCart'
    };

    // --- Core Helper Functions ---
    function excelSerialToDate(serial) {
      if (!serial) return null;
      if (typeof serial === 'string') {
        if (serial.match(/^\d{4}-\d{2}-\d{2}$/)) {
          const parts = serial.split('-');
          return new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
        }
        const n = parseFloat(serial);
        if (isNaN(n)) return new Date(serial);
        serial = n;
      }
      const date = new Date(1899, 11, 30 + Math.floor(serial));
      return date;
    }

    function parseCellDate(val) {
      if (!val) return null;
      if (val instanceof Date) return val;
      return excelSerialToDate(val);
    }

    function formatDate(date) {
      if (!date) return '';
      return date.toLocaleDateString('en-US', {
        month: 'short', day: '2-digit', year: 'numeric'
      });
    }

    // Standard date format for inputs (YYYY-MM-DD)
    function formatISODate(date) {
      if (!date) return '';
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function parseISODateString(s) {
      if (!s) return null;
      const [y, m, d] = s.split('-').map(Number);
      return new Date(y, m - 1, d);
    }

    function isSameDay(d1, d2) {
      if (!d1 || !d2) return false;
      return d1.getFullYear() === d2.getFullYear() &&
        d1.getMonth() === d2.getMonth() &&
        d1.getDate() === d2.getDate();
    }

    // --- UI State Persistence (local only, not synced) ---
    function saveUIState() {
      localStorage.setItem('budget_tracker_sidebar_collapsed', state.sidebarCollapsed ? 'true' : 'false');
    }

    // --- Get Config Helpers ---
    function getConfig() {
      const configRecord = databaseArray.find(r => r.table === 'config_basic' && !r.deleted);
      if (configRecord) {
        return {
          currency: configRecord.data.currency || '$',
          startBalance: parseFloat(configRecord.data.startBalance) || 0,
          userName: configRecord.data.userName || '',
          startDayOfWeek: configRecord.data.startDayOfWeek !== undefined ? configRecord.data.startDayOfWeek : 1,
          hideCompleted: configRecord.data.hideCompleted || false
        };
      }
      return { currency: '$', startBalance: 0, userName: '', startDayOfWeek: 1, hideCompleted: false };
    }

    function formatMoney(amount, symbol) {
      if (symbol === undefined) { symbol = getConfig().currency; }
      const isNegative = amount < 0;
      const formatted = Math.abs(amount).toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 2 });
      return (isNegative ? '-' : '') + symbol + formatted;
    }

    // --- Computed State Views ---
    function getSubcategories() {
      const subs = { Income: [], Savings: [], Bills: [], Debt: [], Expense: [] };
      databaseArray.forEach(r => {
        if (r.table === 'categories' && !r.deleted) {
          const cat = r.data.category;
          const sub = r.data.subcategory;
          if (cat && sub && subs[cat]) {
            subs[cat].push({ name: sub, id: r.id });
          }
        }
      });
      return subs;
    }

    function getTransactions() {
      return databaseArray
        .filter(r => r.table === 'transactions' && !r.deleted)
        .map(r => ({
          id: r.id,
          parsedDate: parseCellDate(r.data.date),
          amount: parseFloat(r.data.amount) || 0,
          category: r.data.category,
          subcategory: r.data.subcategory,
          notes: r.data.notes || ''
        }))
        .sort((a, b) => (b.parsedDate?.getTime() || 0) - (a.parsedDate?.getTime() || 0));
    }

    function getCurrentBalance() {
      const conf = getConfig();
      let bal = conf.startBalance;
      getTransactions().forEach(t => {
        if (t.category === 'Income') bal += t.amount;
        else bal -= t.amount;
      });
      return bal;
    }

    function getGoalsList(txs) {
      return databaseArray
        .filter(r => r.table === 'goals' && !r.deleted)
        .map(r => {
          const saved = txs.filter(t => t.category === r.data.category && t.subcategory === r.data.subcategory).reduce((sum, t) => sum + t.amount, 0);
          return { id: r.id, category: r.data.category, subcategory: r.data.subcategory, goal: parseFloat(r.data.goal) || 0, saved };
        });
    }

    function getBills() {
      return databaseArray
        .filter(r => r.table === 'bills' && !r.deleted)
        .map(r => ({
          id: r.id,
          category: r.data.category,
          subcategory: r.data.subcategory,
          frequency: r.data.frequency || 'Monthly',
          start: parseCellDate(r.data.start),
          end: parseCellDate(r.data.end),
          ticked: r.data.ticked ? String(r.data.ticked).split(',').map(s => s.trim()).filter(Boolean) : []
        }));
    }

    function getBudgetPeriods(txs) {
      const periods = [];
      databaseArray.filter(r => r.table === 'budgets' && !r.deleted).forEach(r => {
        const startDate = parseCellDate(r.data.periodStart);
        const endDate = parseCellDate(r.data.periodEnd);
        if (!startDate || !endDate || startDate.getFullYear() <= 1900) return;
        const id = `${formatISODate(startDate)}_${formatISODate(endDate)}`;
        let p = periods.find(x => x.id === id);
        if (!p) { p = { id, start: startDate, end: endDate, settings: [] }; periods.push(p); }
        if (r.data.category && r.data.subcategory) {
          p.settings.push({ id: r.id, category: r.data.category, subcategory: r.data.subcategory, amount: parseFloat(r.data.amount) || 0 });
        }
      });
      return periods.sort((a, b) => (b.start?.getTime() || 0) - (a.start?.getTime() || 0));
    }

    function calculateBalanceAtDate(date, txs, startBal) {
      let bal = startBal;
      txs.forEach(t => {
        if (t.parsedDate && t.parsedDate < date) {
          if (t.category === 'Income') bal += t.amount;
          else bal -= t.amount;
        }
      });
      return bal;
    }

    function getOccurrencesOnDate(date, billsSource) {
      if (!date) return [];
      date.setHours(0, 0, 0, 0);
      return billsSource.filter(bill => {
        if (!bill.start) return false;

        const bStart = new Date(bill.start); bStart.setHours(0, 0, 0, 0);
        if (date < bStart) return false;

        if (bill.end) {
          const bEnd = new Date(bill.end); bEnd.setHours(0, 0, 0, 0);
          if (date > bEnd) return false;
        }

        switch (bill.frequency) {
          case 'Daily':
            return true;
          case 'Weekly':
            return date.getDay() === bStart.getDay();
          case 'Bi-weekly':
            const diffWeeks = Math.floor((date - bStart) / (7 * 24 * 60 * 60 * 1000));
            return date.getDay() === bStart.getDay() && diffWeeks % 2 === 0;
          case 'Monthly':
            return date.getDate() === bStart.getDate();
          case 'Quarterly':
            return date.getDate() === bStart.getDate() && (date.getMonth() - bStart.getMonth()) % 3 === 0;
          case 'Annual':
            return date.getDate() === bStart.getDate() && date.getMonth() === bStart.getMonth();
          default:
            return false;
        }
      });
    }

    function toggleBillStatus(billId, occurrenceDate) {
      const dateStr = formatISODate(occurrenceDate);
      databaseArray = databaseArray.map(record => {
        if (record.id === billId) {
          let tickedArray = record.data.ticked ? String(record.data.ticked).split(',').map(s => s.trim()).filter(Boolean) : [];
          if (tickedArray.includes(dateStr)) {
            tickedArray = tickedArray.filter(d => d !== dateStr);
          } else {
            tickedArray.push(dateStr);
          }
          return updateRecordData(record, { ticked: tickedArray.join(',') });
        }
        return record;
      });
      updateDataState(databaseArray, true);
      scheduleCloudSync();
    }

    function getPeriodHeading(start, end) {
      if (!start || !end) return "";
      const isFirstDay = start.getDate() === 1;
      const lastDayOfMonth = new Date(start.getFullYear(), start.getMonth() + 1, 0).getDate();
      const isLastDay = end.getDate() === lastDayOfMonth;
      const isSameMonth = start.getMonth() === end.getMonth();
      const isSameYear = start.getFullYear() === end.getFullYear();

      if (isFirstDay && isLastDay && isSameMonth && isSameYear) {
        return `${start.toLocaleDateString('en-US', { month: 'long' })}, ${start.getFullYear()}`;
      }
      return `${formatDate(start)} to ${formatDate(end)}`;
    }

    // --- Premium Custom Donut Chart Generator ---
    function generateDonutChart(chartData, size = 160, chartId = '') {
      const radius = size / 2;
      const innerRadius = radius * 0.65; // slightly thinner for more elegant proportion
      const outerRadius = radius;
      const total = chartData.reduce((sum, d) => sum + d.value, 0);

      if (total === 0) {
        return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
          <circle cx="${radius}" cy="${radius}" r="${(outerRadius + innerRadius) / 2}" fill="none" stroke="rgba(100, 116, 139, 0.08)" stroke-width="${outerRadius - innerRadius}" />
          <text x="${radius}" y="${radius + 5}" text-anchor="middle" font-family="var(--font-display)" font-weight="900" font-size="14" fill="var(--slate-400)">0%</text>
        </svg>`;
      }

      let currentAngle = -Math.PI / 2; // Start from top 12 o'clock
      let paths = '';

      chartData.forEach(d => {
        const sliceAngle = (d.value / total) * 2 * Math.PI;
        const endAngle = currentAngle + sliceAngle;
        const escapedName = d.name.replace(/'/g, "\\'");
        const sliceClass = chartId ? `${chartId}-slice-${d.name.toLowerCase().replace(/\s+/g, '-')}` : '';
        const percent = (d.value / total) * 100;

        if (d.value === total) {
          paths += `<circle cx="${radius}" cy="${radius}" r="${(outerRadius + innerRadius) / 2}" fill="none" stroke="${d.color}" stroke-width="${outerRadius - innerRadius}" class="chart-slice ${sliceClass}" filter="url(#premium-chart-shadow)" style="transition: all 0.3s ease; cursor: pointer;"
            ${chartId ? `onmouseenter="window.handleGenDonutHover('${chartId}', '${escapedName}', ${d.value}, 100, this)" onmouseleave="window.handleGenDonutLeave('${chartId}', ${total})"` : ''}>
            <title>${d.name}: ${formatMoney(d.value)}</title>
          </circle>`;
          return;
        }

        // Coordinates for outer ring arc
        const x1_out = radius + outerRadius * Math.cos(currentAngle);
        const y1_out = radius + outerRadius * Math.sin(currentAngle);
        const x2_out = radius + outerRadius * Math.cos(endAngle);
        const y2_out = radius + outerRadius * Math.sin(endAngle);

        // Coordinates for inner ring arc
        const x1_in = radius + innerRadius * Math.cos(currentAngle);
        const y1_in = radius + innerRadius * Math.sin(currentAngle);
        const x2_in = radius + innerRadius * Math.cos(endAngle);
        const y2_in = radius + innerRadius * Math.sin(endAngle);

        const largeArcFlag = sliceAngle > Math.PI ? 1 : 0;

        const dPath = `
          M ${x1_out} ${y1_out}
          A ${outerRadius} ${outerRadius} 0 ${largeArcFlag} 1 ${x2_out} ${y2_out}
          L ${x2_in} ${y2_in}
          A ${innerRadius} ${innerRadius} 0 ${largeArcFlag} 0 ${x1_in} ${y1_in}
          Z
        `;

        paths += `<path d="${dPath}" fill="${d.color}" class="chart-slice ${sliceClass}" stroke="#ffffff" stroke-width="2.5" filter="url(#premium-chart-shadow)" style="transition: all 0.3s ease; cursor: pointer;"
          ${chartId ? `onmouseenter="window.handleGenDonutHover('${chartId}', '${escapedName}', ${d.value}, ${percent}, this)" onmouseleave="window.handleGenDonutLeave('${chartId}', ${total})"` : ''}>
          <title>${d.name}: ${formatMoney(d.value)}</title>
        </path>`;

        currentAngle = endAngle;
      });

      const formattedTotal = formatMoney(total);

      return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="overflow: visible;" ${chartId ? `id="${chartId}"` : ''}>
        <defs>
          <filter id="premium-chart-shadow" x="-30%" y="-30%" width="160%" height="160%">
            <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.04" />
            <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#4f46e5" flood-opacity="0.03" />
          </filter>
        </defs>
        <g>${paths}</g>
        <!-- Center inner soft glow element -->
        <circle cx="${radius}" cy="${radius}" r="${innerRadius - 4}" fill="rgba(255, 255, 255, 0.9)" stroke="rgba(255, 255, 255, 0.6)" stroke-width="1" />
        ${chartId ? `
        <g class="pointer-events-none">
          <text x="${radius}" y="${radius - 12}" text-anchor="middle" font-family="var(--font-body)" font-weight="900" font-size="11" fill="#94a3b8" letter-spacing="0.08em" id="${chartId}-label">TOTAL</text>
          <text x="${radius}" y="${radius + 16}" text-anchor="middle" font-family="var(--font-display)" font-weight="900" font-size="${size >= 240 ? 22 : 16}" fill="#1e293b" id="${chartId}-value">${formattedTotal}</text>
        </g>
        ` : ''}
      </svg>`;
    }

    // --- Interactive donut hover handlers ---
    window.handleGenDonutHover = function (chartId, name, value, percent, el) {
      const labelEl = document.getElementById(chartId + '-label');
      const valEl = document.getElementById(chartId + '-value');
      if (labelEl) labelEl.textContent = name.toUpperCase();
      if (valEl) valEl.textContent = formatMoney(value);

      const svg = document.getElementById(chartId);
      if (svg) {
        svg.querySelectorAll('.chart-slice').forEach(p => {
          p.style.opacity = p === el ? '1' : '0.25';
          p.style.transform = p === el ? 'scale(1.03)' : 'scale(1)';
          p.style.transformOrigin = p === el ? '50% 50%' : '';
        });
      }
    };

    window.handleGenDonutLeave = function (chartId, totalValue) {
      const labelEl = document.getElementById(chartId + '-label');
      const valEl = document.getElementById(chartId + '-value');
      if (labelEl) labelEl.textContent = 'TOTAL';
      if (valEl) valEl.textContent = formatMoney(totalValue);
      if (svg) {
        svg.querySelectorAll('.chart-slice').forEach(p => {
          p.style.opacity = '1';
          p.style.transform = '';
        });
      }
    };

    // --- State Loading / Startup System ---
    function loadState() {
      const storedCollapsed = localStorage.getItem('budget_tracker_sidebar_collapsed');
      state.sidebarCollapsed = storedCollapsed === 'true';

      // Ensure config_basic defaults are evaluated and stored without trigger double render
      updateDataState(databaseArray, true, false);

      // Restore active tab and active budget period ID from sessionStorage to support page refresh
      const sessionTab = sessionStorage.getItem('budget_tracker_active_tab');
      const sessionPeriodId = sessionStorage.getItem('budget_tracker_active_period_id');

      if (sessionTab !== null) {
        state.activeTab = sessionTab;
        state.activeBudgetPeriodId = sessionPeriodId || null;
      } else {
        const txs = getTransactions();
        const periods = getBudgetPeriods(txs);

        if (periods.length === 0) {
          state.activeTab = 'setup';
          state.activeBudgetPeriodId = null;
        } else {
          const today = new Date();
          today.setHours(0, 0, 0, 0);
          const currentPeriods = periods.filter(p => {
            const pStart = new Date(p.start); pStart.setHours(0, 0, 0, 0);
            const pEnd = new Date(p.end); pEnd.setHours(0, 0, 0, 0);
            return today >= pStart && today <= pEnd;
          });

          if (currentPeriods.length === 1) {
            state.activeTab = 'budgets';
            state.activeBudgetPeriodId = currentPeriods[0].id;
          } else {
            // Multiple current periods or no current period -> open "my budgets" tab
            state.activeTab = 'budgets';
            state.activeBudgetPeriodId = null;
          }
        }
      }
    }

    // --- Core Dynamic UI Rendering Hub ---
    function render() {
      const container = document.getElementById('tab-content-container');
      const scrollOffset = container ? container.scrollTop : 0;

      // Save current navigation state to sessionStorage to support page refresh
      sessionStorage.setItem('budget_tracker_active_tab', state.activeTab || 'budgets');
      if (state.activeBudgetPeriodId) {
        sessionStorage.setItem('budget_tracker_active_period_id', state.activeBudgetPeriodId);
      } else {
        sessionStorage.removeItem('budget_tracker_active_period_id');
      }

      // Update sidebar visual active state
      document.querySelectorAll('.menu-item').forEach(btn => {
        if (btn.getAttribute('data-tab') === state.activeTab && !state.activeBudgetPeriodId) {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
      });

      const config = getConfig();
      const txs = getTransactions();
      const currentBal = getCurrentBalance();

      // Update Core Header indicators
      const headerBalEl = document.getElementById('header-balance-lbl');
      if (headerBalEl) {
        headerBalEl.textContent = formatMoney(currentBal, config.currency);
      }

      // Update user greeting in sidebar logo header
      const greetingEl = document.getElementById('user-greeting-lbl');
      if (greetingEl) {
        greetingEl.textContent = `Hi ${config.userName}`;
      }

      // Render Today Widget in sidebar footer
      renderTodayWidget(currentBal, config.currency);

      const periods = getBudgetPeriods(txs);
      const activePeriod = periods.find(p => p.id === state.activeBudgetPeriodId);

      // Select the core container
      if (container) {
        container.style.overflow = '';
        container.style.height = '';
        container.style.display = '';
        container.style.flexDirection = '';
      }

      // Direct render path depending on tab state
      if (state.activeTab === 'budgets') {
        if (state.activeBudgetPeriodId) {
          renderBudgetDetailsView(container, activePeriod, txs, config);
        } else {
          renderBudgetsListView(container, periods, txs, config);
        }
      } else if (state.activeTab === 'transactions') {
        renderTransactionsView(container, txs, config);
      } else if (state.activeTab === 'goals') {
        renderGoalsView(container, txs, config);
      } else if (state.activeTab === 'calendar') {
        renderCalendarView(container, config);
        // Sync schedules sidebar height to calendar on desktop only
        requestAnimationFrame(() => {
          const calBox = document.getElementById('calendar-box');
          const sidebar = document.getElementById('schedules-sidebar');
          if (!calBox || !sidebar) return;
          if (window.innerWidth >= 1201) {
            sidebar.style.maxHeight = calBox.offsetHeight + 'px';
            sidebar.style.overflowY = 'auto';
          } else {
            sidebar.style.maxHeight = '';
            sidebar.style.overflowY = '';
          }
        });
      } else if (state.activeTab === 'setup') {
        renderSetupView(container, config);
      } else if (state.activeTab === 'new_budget_period') {
        renderNewBudgetPeriodView(container, config);
      }

      // Restore scroll offset
      if (container) {
        container.scrollTop = scrollOffset;
      }

      // Restore GAPI/GIS sync status badge display and hooks
      setSyncStatus(currentSyncStatusText, currentSyncStatusType);
    }

    // --- Render View 2: Budget Period Details ---
    function renderBudgetDetailsView(container, period, txs, config) {
      if (!period) {
        state.activeBudgetPeriodId = null;
        render();
        return;
      }

      const periodTxs = txs.filter(t => t.parsedDate >= period.start && t.parsedDate <= period.end);

      // Calculate Stats
      const actualInflow = periodTxs.filter(t => t.category === 'Income').reduce((s, t) => s + t.amount, 0);
      const actualOutflow = periodTxs.filter(t => t.category !== 'Income').reduce((s, t) => s + t.amount, 0);

      const actualBills = periodTxs.filter(t => t.category === 'Bills').reduce((s, t) => s + t.amount, 0);
      const actualExpenses = periodTxs.filter(t => t.category === 'Expense').reduce((s, t) => s + t.amount, 0);
      const actualSavings = periodTxs.filter(t => t.category === 'Savings').reduce((s, t) => s + t.amount, 0);
      const actualDebt = periodTxs.filter(t => t.category === 'Debt').reduce((s, t) => s + t.amount, 0);

      const plannedInflow = period.settings.filter(i => i.category === 'Income').reduce((s, i) => s + i.amount, 0);
      const plannedOutflow = period.settings.filter(i => i.category !== 'Income').reduce((s, i) => s + i.amount, 0);

      const startBal = calculateBalanceAtDate(period.start, txs, config.startBalance);
      const leftToSpend = (startBal + actualInflow) - actualOutflow;

      const today = new Date(); today.setHours(0, 0, 0, 0);
      const sDate = new Date(period.start); sDate.setHours(0, 0, 0, 0);
      const eDate = new Date(period.end); eDate.setHours(0, 0, 0, 0);
      const daysLeft = (today > eDate) ? 0 : Math.max(0, Math.ceil((eDate - (today > sDate ? today : sDate)) / (1000 * 60 * 60 * 24)) + 1);

      // Generate Pie Data
      const pieData = [
        { name: 'Bills', value: actualBills, color: PIE_COLORS.Bills },
        { name: 'Expense', value: actualExpenses, color: PIE_COLORS.Expense },
        { name: 'Savings', value: actualSavings, color: PIE_COLORS.Savings },
        { name: 'Debt', value: actualDebt, color: PIE_COLORS.Debt }
      ].filter(d => d.value > 0);

      // 1. Generate Left Column Category breakdowns
      let categoryCardsHtml = '';
      const detailsCategories = ['Income', 'Bills', 'Debt', 'Savings', 'Expense'];
      detailsCategories.forEach(cat => {

          const variance = cat === 'Income' ? row.actual - row.planned : row.planned - row.actual;

          const isNAProgress = row.planned === 0 && row.actual > 0;
          const progress = row.planned > 0 ? (row.actual / row.planned) * 100 : (row.actual > 0 ? 100 : 0);

          const progressGradient = cat === 'Income' ? 'background: linear-gradient(90deg, #34d399, #10b981) !important;' : (progress > 100 ? 'background: linear-gradient(90deg, #f43f5e, #e11d48) !important;' : 'background: linear-gradient(90deg, #818cf8, #4f46e5) !important;');

        else if (cat === 'Debt') dotBg = '#f59e0b';
        else if (cat === 'Expense') dotBg = '#a855f7';

      // Calculate Dynamic Insights (6 distinct points in custom user-ordered sequence)

      // 1. Daily Allowance (Indigo)
      if (daysLeft > 0 && leftToSpend > 0) {

      const spendingRate = actualInflow > 0 ? (actualOutflow / actualInflow) * 100 : 0;

      container.className = "tab-content-container custom-scrollbar premium-light-panel";

        if (insightsCard && transactionsCard) {
          const syncHeights = () => {
            if (window.innerWidth >= 768) {
              const h = insightsCard.offsetHeight;
              if (h > 0) {
                transactionsCard.style.maxHeight = `${h}px`;
                transactionsCard.style.height = `${h}px`;
              }
            } else {
              transactionsCard.style.maxHeight = '';
              transactionsCard.style.height = '';
            }

          if (window.detailsResizeObserver) {
            window.detailsResizeObserver.disconnect();

          const ro = new ResizeObserver(syncHeights);
          ro.observe(insightsCard);
          window.detailsResizeObserver = ro;

          // Initial sync
          syncHeights();
        }
      }, 50);

    // --- Render View 3: Transactions Tab ---
    function renderTransactionsView(container, txs, config) {
      // Subcategories selection setup
      const subsMap = getSubcategories();
      let subOptions = '<option value="All">All Subcategories</option>';
      if (state.txFilterCat !== 'All' && subsMap[state.txFilterCat]) {
        subsMap[state.txFilterCat].forEach(s => {
          subOptions += `<option value="${s.name}" ${state.txFilterSub === s.name ? 'selected' : ''}>${s.name}</option>`;
        });
      } else {
        // Collect all subcategories
        const allUniqueSubs = [];
        Object.values(subsMap).forEach(list => {
          list.forEach(s => {
            if (!allUniqueSubs.includes(s.name)) allUniqueSubs.push(s.name);
          });
        });
        allUniqueSubs.sort().forEach(sub => {
          subOptions += `<option value="${sub}" ${state.txFilterSub === sub ? 'selected' : ''}>${sub}</option>`;
        });
      }

      // Perform Filtering on Transactions
      const filteredTxs = txs.filter(t => {
        const tNotes = t.notes || '';
        const tCat = t.category || '';
        const tSub = t.subcategory || '';
        const tAmt = t.amount !== null ? String(t.amount) : '';
        const matchesSearch = (tNotes + tCat + tSub + tAmt).toLowerCase().includes(state.txSearch.toLowerCase());

        const matchesCat = state.txFilterCat === 'All' || t.category === state.txFilterCat;
        const matchesSub = state.txFilterSub === 'All' || t.subcategory === state.txFilterSub;

        const tTime = t.parsedDate ? t.parsedDate.getTime() : null;
        const startTime = state.txDateStart ? parseISODateString(state.txDateStart).getTime() : null;
        const endTime = state.txDateEnd ? parseISODateString(state.txDateEnd).getTime() : null;
        const matchesDate = (!startTime || (tTime && tTime >= startTime)) && (!endTime || (tTime && tTime <= endTime));

        return matchesSearch && matchesCat && matchesSub && matchesDate;
      });

      let rowsHtml = '';
      if (filteredTxs.length === 0) {
        rowsHtml = `
          <tr>
            <td colspan="6" class="no-results">
              <div style="font-size: 2rem;">${getIconSVG('Search', 36, 1.5)}</div>
              <p>No matching transactions found</p>
              <span style="font-size: 0.75rem; color: var(--slate-400);">Try adjusting your search filters or add a new transaction.</span>
            </td>
          </tr>
        `;
      } else {
        filteredTxs.forEach(t => {
          const isIncome = t.category === 'Income';
          rowsHtml += `
            <tr class="group hover:bg-slate-50 transition-colors">
              <td style="text-align: center; overflow: visible;">
                <div style="display: inline-flex; gap: 0.25rem; align-items: center; justify-content: center;">
                  <button class="tx-action-btn edit" title="Edit" onclick="openEditTransaction('${t.id}')">
                    ${getIconSVG('Edit3', 16, 2)}
                  </button>
                  <button class="tx-action-btn delete" title="Delete" onclick="deleteTransactionDirect('${t.id}')">
                    ${getIconSVG('Trash2', 16, 2)}
                  </button>
                </div>
              </td>
              <td>${t.parsedDate ? formatDate(t.parsedDate) : '-'}</td>
              <td><span class="cat-badge ${t.category}">${t.category}</span></td>
              <td style="font-weight: 700; color: var(--slate-800);">${t.subcategory}</td>
              <td class="tx-amount ${isIncome ? 'positive' : 'negative'}">
                ${formatMoney(t.amount, config.currency)}
              </td>
              <td style="color: var(--slate-400);">${t.notes || '-'}</td>
            </tr>
          `;
        });
      }

      container.innerHTML = `
        <div class="page-container">
          <header class="page-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;">
            <div>
              <h1 class="page-title" style="margin-bottom: 0;">Transaction Tracker</h1>
            </div>
            <div style="display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;">
              <button class="btn btn-primary" onclick="openAddTransactionModal()">
                ${getIconSVG('Plus', 16, 2.5)} Add Transaction
              </button>
              <div id="syncStatusIndicator" class="sync-status" style="display: none;"></div>
            </div>
          </header>
          
          <!-- Unified Ledger Table Card -->
          <div class="tx-table-card" style="overflow: visible;">
            <!-- Integrated Filters Row -->
            <div class="ledger-filters-header">
              <div class="filters-grid">
                <div class="search-input-wrapper">
                  <span class="search-input-icon">${getIconSVG('Search', 16, 2.5)}</span>
                  <input type="text" id="tx-search-field" placeholder="Notes, amount..." value="${state.txSearch}" oninput="updateTxFilterSearch(this.value)">
                </div>
                
                <div class="filter-group">
                  <span class="filter-label">Start Date</span>
                  <input type="date" class="filter-date" id="tx-filter-date-start" value="${state.txDateStart}" onchange="updateTxFilterDateStart(this.value)">
                </div>
                
                <div class="filter-group">
                  <span class="filter-label">End Date</span>
                  <input type="date" class="filter-date" id="tx-filter-date-end" value="${state.txDateEnd}" min="${state.txDateStart}" onchange="updateTxFilterDateEnd(this.value)">
                </div>
                
                <div class="filter-group">
                  <span class="filter-label">Category</span>
                  <select class="filter-select" id="tx-filter-cat-select" onchange="updateTxFilterCat(this.value)">
                    <option value="All" ${state.txFilterCat === 'All' ? 'selected' : ''}>All Categories</option>
                    ${CATEGORIES.map(c => `<option value="${c}" ${state.txFilterCat === c ? 'selected' : ''}>${c}</option>`).join('')}
                  </select>
                </div>
                
                <div class="filter-group">
                  <span class="filter-label">Sub-Category</span>
                  <select class="filter-select" id="tx-filter-sub-select" onchange="updateTxFilterSub(this.value)">
                    ${subOptions}
                  </select>
                </div>
                
                <button class="clear-filters-btn" onclick="clearAllTxFilters()">
                  Clear
                </button>
              </div>
            </div>
            
            <!-- Table View container -->
            <div class="table-container" style="overflow-x: auto; -webkit-overflow-scrolling: touch; border: none; border-radius: 0; box-shadow: none; margin-bottom: 0;">
              <table class="tx-table">
                <thead>

                    <th style="width: 180px;">Date</th>
                    <th style="width: 140px;">Category</th>

                <tbody id="tx-table-body">
                  ${rowsHtml}

              </table>
            </div>
          </div>
        </div>
      `;
    }

    // --- Render View 4: Goals Tab ---
    function renderGoalsView(container, txs, config) {
      const subs = getSubcategories();
      const goalsList = getGoalsList(txs);

      const savingsItems = subs.Savings.map(s => {
        const goalObj = goalsList.find(g => g.category === 'Savings' && g.subcategory === s.name);
        return {
          name: s.name,
          goal: goalObj?.goal || 0,
          saved: goalObj?.saved || 0,
          id: goalObj?.id
        };
      });

      const debtItems = subs.Debt.map(d => {
        const goalObj = goalsList.find(g => g.category === 'Debt' && g.subcategory === d.name);
        return {
          name: d.name,
          goal: goalObj?.goal || 0,
          saved: goalObj?.saved || 0,
          id: goalObj?.id
        };
      });

      const totalSavingsSaved = savingsItems.reduce((s, i) => s + i.saved, 0);
      const totalSavingsGoal = savingsItems.reduce((s, i) => s + i.goal, 0);
      const totalDebtPaid = debtItems.reduce((s, i) => s + i.saved, 0);
      const totalDebtGoal = debtItems.reduce((s, i) => s + i.goal, 0);

      container.innerHTML = `
        <div class="page-container">
          <header class="page-header" style="margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">

              <div id="syncStatusIndicator" class="sync-status" style="display: none;"></div>
            </div>
          </header>
          
          <!-- Stats Summary -->
          <div class="grid-cols-4" style="margin-bottom: 3rem; flex-shrink: 0;">
            ${renderStatCard('Total Saved', formatMoney(totalSavingsSaved, config.currency), 'TrendingUp', 'bg-blue-500', 'bg-blue-50/50', 'text-blue-500', 'text-blue-700', 'border-blue-100')}
            ${renderStatCard('Savings Goal', formatMoney(totalSavingsGoal, config.currency), 'Target', 'bg-blue-400', 'bg-blue-50/50', 'text-blue-400', 'text-blue-700', 'border-blue-100')}
            ${renderStatCard('Debt Paid', formatMoney(totalDebtPaid, config.currency), 'TrendingDown', 'bg-amber-500', 'bg-amber-50/50', 'text-amber-500', 'text-amber-700', 'border-amber-100')}
            ${renderStatCard('Debt Goal', formatMoney(totalDebtGoal, config.currency), 'Flag', 'bg-amber-400', 'bg-amber-50/50', 'text-amber-400', 'text-amber-700', 'border-amber-100')}

            ${getIconSVG('TrendingUp', 16, 2.5)} Savings Progress
          </div>
          <div class="goals-grid" style="margin-bottom: 3.5rem;">
            ${savingsItems.map(item => generateGoalCardMarkup(item, 'Savings', config)).join('')}
          </div>

          <div class="breakdown-section-header" style="margin-bottom: 2rem; font-size: 0.875rem; font-weight: 900; color: var(--amber-500); background: var(--amber-50); width: fit-content; padding: 0.375rem 1rem; border-radius: 9999px; border: 1px solid var(--amber-100); text-transform: uppercase; display: flex; align-items: center; gap: 0.5rem;">

    function generateGoalCardMarkup(item, category, config) {
      const rawPercent = item.goal > 0 ? (item.saved / item.goal) * 100 : 0;
      const percentRounded = Math.round(rawPercent);
      const percentForCircle = Math.max(0, Math.min(100, rawPercent));
      const left = item.goal - item.saved;

      // Arc variables for circular SVG
      const size = 150;
      const strokeWidth = 12;
      const radius = (size - strokeWidth) / 2;
      const circumference = radius * 2 * Math.PI;
      const strokeOffset = circumference - (percentForCircle / 100) * circumference;

      const ringColor = category === 'Savings' ? '#3b82f6' : '#f59e0b';

      return `
        <div class="goal-card" onclick="openEditGoalModal('${category}', '${item.name}', ${item.goal}, ${item.id ? `'${item.id}'` : 'null'})">
          <div style="position: absolute; top: 0; right: 0; width: 6rem; height: 6rem; background: ${category === 'Savings' ? 'linear-gradient(135deg, #60a5fa, #3b82f6)' : 'linear-gradient(135deg, #fbbf24, #f59e0b)'}; opacity: 0.03; margin-right: -3rem; margin-top: -3rem; border-radius: 9999px; pointer-events: none;"></div>
          
          <button class="goal-card-edit-btn">${getIconSVG('Edit3', 16, 2.5)}</button>
          
          <h3 class="goal-card-title">${item.name}</h3>
          
          <div class="goal-svg-container">
            <svg width="${size}" height="${size}" style="transform: rotate(-90deg);">
              <circle cx="${size / 2}" cy="${size / 2}" r="${radius}" stroke="#f1f5f9" stroke-width="${strokeWidth}" fill="transparent" />
              <circle cx="${size / 2}" cy="${size / 2}" r="${radius}" stroke="${ringColor}" stroke-width="${strokeWidth}" fill="transparent" 
                stroke-dasharray="${circumference}" stroke-dashoffset="${strokeOffset}" stroke-linecap="round" style="transition: stroke-dashoffset 1s ease-out;" />
            </svg>
            <div class="goal-svg-percentage">
              <span>${percentRounded}%</span>
            </div>
          </div>
          
          <div class="goal-card-details">
            <div class="goal-detail-row">
              <span class="goal-detail-label">Goal</span>
              <span class="goal-detail-value">${formatMoney(item.goal, config.currency)}</span>
            </div>
            <div class="goal-detail-row">
              <span class="goal-detail-label">${category === 'Savings' ? 'Saved' : 'Paid'}</span>
              <span class="goal-detail-value">${formatMoney(item.saved, config.currency)}</span>
            </div>
            <div class="goal-detail-row" style="border-top: 1px dashed var(--slate-100); padding-top: 0.5rem; margin-top: 0.25rem;">
              <span class="goal-detail-label">Balance</span>
              <span class="goal-detail-value highlight">${formatMoney(left, config.currency)}</span>
            </div>
          </div>
        </div>
      `;
    }

    // --- Render View 5: Calendar / Bills ---
    function renderCalendarView(container, config) {
      const year = state.calDate.getFullYear();
      const month = state.calDate.getMonth();
      const weekStartVal = getConfig().startDayOfWeek;

      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      let startOffset = firstDay.getDay() - weekStartVal;
      if (startOffset < 0) startOffset += 7;

      const calendarDays = [];
      for (let i = startOffset; i > 0; i--) {
        calendarDays.push({ date: new Date(year, month, 1 - i), current: false });
      }
      for (let i = 1; i <= lastDay.getDate(); i++) {
        calendarDays.push({ date: new Date(year, month, i), current: true });
      }
      while (calendarDays.length < 42) {
        calendarDays.push({
          date: new Date(year, month, lastDay.getDate() + (calendarDays.length - (startOffset + lastDay.getDate()) + 1)),
          current: false
        });
      }

      const weekLabels = weekStartVal === 0
        ? ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat']
        : ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];

      const monthName = state.calDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

    function renderDayCellMarkup(date, isCurrentMonth, billsSource, isToday = false) {
      const occurrences = getOccurrencesOnDate(date, billsSource);
      const isoStr = formatISODate(date);

      let eventsHtml = '';
      const maxShow = 3;

      // Filter ticks if toggle activated
      let displayedOccs = occurrences;
      if (getConfig().hideCompleted) {
        displayedOccs = occurrences.filter(occ => !occ.ticked.includes(isoStr));
      }

      const hasMore = displayedOccs.length > maxShow;
      const showCount = hasMore ? maxShow - 1 : maxShow;
      const shownOccs = displayedOccs.slice(0, showCount);
      const remainingCount = displayedOccs.length - showCount;

      shownOccs.forEach(occ => {
        const isTicked = occ.ticked.includes(isoStr);
        eventsHtml += `
          <button class="calendar-bill-badge ${isTicked ? 'ticked' : ''}" onclick="event.stopPropagation(); handleToggleBill('${occ.id}', '${isoStr}')">
            <span class="truncate ${isTicked ? 'line-through opacity-60' : ''}">${occ.subcategory}</span>
            ${isTicked ? getIconSVG('CheckCircle2', 10, 3) : ''}
          </button>
        `;
      });

      if (remainingCount > 0) {
        eventsHtml += `
          <button class="calendar-more-btn" onclick="event.stopPropagation(); openMoreBillsModal('${isoStr}')">
            ${remainingCount} more
          </button>
        `;
      }

      return `
        <div class="calendar-day-cell ${isCurrentMonth ? '' : 'other-month'} ${isToday ? 'today' : ''}">
          <div class="calendar-day-number-wrapper">
            <span class="calendar-day-number ${isToday ? 'today' : (isCurrentMonth ? '' : 'other-month')}">${date.getDate()}</span>
          </div>
          <div class="calendar-day-events">
            ${eventsHtml}
          </div>
        </div>
      `;
    }

    // --- Action Triggers & Navigation Hub ---
    function selectTab(tabName) {
      state.activeTab = tabName;
      state.activeBudgetPeriodId = null;

      // Update sidebar visual active state
      document.querySelectorAll('.menu-item').forEach(btn => {
        if (btn.getAttribute('data-tab') === tabName && !state.activeBudgetPeriodId) {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
      });

      render();
    }

    function selectBudgetPeriod(periodId) {
      state.activeBudgetPeriodId = periodId;
      // Clear sidebar active states
      document.querySelectorAll('.menu-item').forEach(btn => {
        btn.classList.remove('active');
      });
      render();
    }

    function deselectBudgetPeriod() {
      state.activeBudgetPeriodId = null;
      // Restore sidebar active states
      document.querySelectorAll('.menu-item').forEach(btn => {
        if (btn.getAttribute('data-tab') === state.activeTab) {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
      });
      render();
    }

    function openNewBudgetPeriodForm() {
      const subs = getSubcategories();
      const allItems = [];
      CATEGORIES.forEach(cat => {
        (subs[cat] || []).forEach(sub => {
          allItems.push({ cat, sub: sub.name, budget: 0 });
        });
      });
      state.tempBudget = {
        start: formatISODate(new Date()),
        end: formatISODate(new Date(new Date().getFullYear(), new Date().getMonth() + 1, 0)),
        items: allItems
      };
      state.activeTab = 'new_budget_period';
      render();
    }

    window.updateTempBudgetItem = function (cat, sub, val) {
      if (!state.tempBudget) return;
      const item = state.tempBudget.items.find(i => i.cat === cat && i.sub === sub);
      if (item) {
        item.budget = parseFloat(val) || 0;
      }

      const totalInflow = state.tempBudget.items.filter(i => i.cat === 'Income').reduce((s, i) => s + i.budget, 0);
      const totalOutflow = state.tempBudget.items.filter(i => i.cat !== 'Income').reduce((s, i) => s + i.budget, 0);
      const currency = getConfig().currency;

      const incomeValEl = document.getElementById('temp-budget-total-income-val');
      if (incomeValEl) incomeValEl.textContent = formatMoney(totalInflow, currency);

      const outflowValEl = document.getElementById('temp-budget-total-outflow-val');
      if (outflowValEl) outflowValEl.textContent = formatMoney(totalOutflow, currency);

      const catSubtotal = state.tempBudget.items.filter(i => i.cat === cat).reduce((s, i) => s + i.budget, 0);
      const catSubtotalEl = document.getElementById(`temp-budget-subtotal-${cat}`);
      if (catSubtotalEl) catSubtotalEl.textContent = `Subtotal: ${formatMoney(catSubtotal, currency)}`;
    };

    window.updateTempBudgetStartDate = function (val) {
      if (state.tempBudget) {
        state.tempBudget.start = val;
        const endInput = document.getElementById('new-period-end-date');
        if (endInput) endInput.min = val;
      }
    };

    window.updateTempBudgetEndDate = function (val) {
      if (state.tempBudget) {
        state.tempBudget.end = val;
      }
    };

    function cancelNewBudgetPeriod() {
      state.tempBudget = null;
      state.activeTab = 'budgets';
      render();
    }

    function openModifyBudgetPeriod(periodId) {
      const txs = getTransactions();
      const periods = getBudgetPeriods(txs);
      const period = periods.find(p => p.id === periodId);
      if (!period) return;

      const subs = getSubcategories();
      const fullSettings = [];
      CATEGORIES.forEach(cat => {
        (subs[cat] || []).forEach(sub => {
          const existing = period.settings.find(s => s.category === cat && s.subcategory === sub.name);
          fullSettings.push({
            category: cat,
            subcategory: sub.name,
            amount: existing ? existing.amount : 0,
            id: existing ? existing.id : undefined
          });
        });
      });

      state.editingBudget = {
        id: period.id,
        start: period.start,
        end: period.end,
        settings: fullSettings
      };

      openModifyBudgetModal();
    }

    window.updateEditingBudgetItem = function (index, val) {
      if (!state.editingBudget) return;
      state.editingBudget.settings[index].amount = parseFloat(val) || 0;
    };

    function openModifyBudgetModal() {
      if (!state.editingBudget) return;

      const config = getConfig();
      let inputsHtml = '';
      state.editingBudget.settings.forEach((item, i) => {
        inputsHtml += `
          <div class="flex items-center gap-4 bg-slate-50 p-4 rounded-2xl border border-slate-100" style="margin-bottom: 0.75rem;">
            <div class="flex-1 min-w-0" style="text-align: left;">
              <p class="text-[9px] font-black uppercase text-slate-400" style="margin-bottom: 0.15rem; margin-top:0;">${item.category}</p>
              <p class="text-sm font-bold text-slate-800 truncate" style="margin:0;">${item.subcategory}</p>
            </div>
            <div class="prefix-input-wrapper" style="width: 130px;">
              <span class="prefix-input-symbol">${config.currency}</span>
              <input type="number" class="prefix-input-field hide-spin-buttons" 
                placeholder="0" value="${item.amount || ''}" 
                oninput="updateEditingBudgetItem(${i}, this.value)">
            </div>
          </div>
        `;
      });

      const markup = `
        <div class="modal-header">
          <h3 class="modal-title">Modify Period Budget</h3>
          <button class="modal-close-btn" onclick="closeModal()">${getIconSVG('X', 16, 2.5)}</button>
        </div>
        <div class="modal-body">
          <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4" style="margin-top:0;">Adjust Budget Allocations</p>
          <div class="custom-scrollbar" style="max-height: 50vh; overflow-y: auto; padding-right: 0.5rem; margin-bottom: 1.5rem;">
            ${inputsHtml}
          </div>
          <div class="form-actions">
            <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary" onclick="submitModifyBudget()">Save Changes</button>
          </div>
        </div>
      `;
      openModal(markup);
    }

    window.submitModifyBudget = function () {
      if (!state.editingBudget) return;

      const startStr = formatISODate(state.editingBudget.start);
      const endStr = formatISODate(state.editingBudget.end);
      const periodId = state.editingBudget.id;

      state.editingBudget.settings.forEach(s => {
        if (s.id) {
          databaseArray = databaseArray.map(record =>
            record.id === s.id
              ? updateRecordData(record, { amount: s.amount })
              : record
          );
        } else {
          const now = Date.now();
          const newRecord = {
            id: "budget_" + now.toString(36) + "_" + Math.random().toString(36).substr(2, 5),
            table: "budgets",
            updatedAt: now,
            deleted: false,
            data: { periodStart: startStr, periodEnd: endStr, category: s.category, subcategory: s.subcategory, amount: s.amount },
            updatedKeys: { periodStart: now, periodEnd: now, category: now, subcategory: now, amount: now }
          };
          databaseArray.push(newRecord);
        }
      });

      updateDataState(databaseArray, true);
      scheduleCloudSync();

      state.editingBudget = null;
      closeModal();

      state.activeTab = 'budgets';
      state.activeBudgetPeriodId = periodId;
      render();
    };

    // Save Budget Period Creation
    function saveNewBudgetPeriod() {
      if (!state.tempBudget) return;
      const sVal = state.tempBudget.start;
      const eVal = state.tempBudget.end;

      if (!sVal || !eVal) {
        alert('Please fill both Start and End Dates');
        return;
      }

      state.tempBudget.items.forEach(item => {
        const now = Date.now();
        const newRecord = {
          id: "budget_" + now.toString(36) + "_" + Math.random().toString(36).substr(2, 5),
          table: "budgets",
          updatedAt: now,
          deleted: false,
          data: { periodStart: sVal, periodEnd: eVal, category: item.cat, subcategory: item.sub, amount: item.budget || 0 },
          updatedKeys: { periodStart: now, periodEnd: now, category: now, subcategory: now, amount: now }
        };
        databaseArray.push(newRecord);
      });

      updateDataState(databaseArray, true);
      scheduleCloudSync();

      state.activeTab = 'budgets';
      state.activeBudgetPeriodId = `${sVal}_${eVal}`;
      state.tempBudget = null;
      render();
    }

    // Note: saveModifiedBudgetPeriod is obsolete as modifications are now saved via submitModifyBudget modal action.

    function deleteBudgetPeriod(periodId) {
      if (confirm('Are you sure you want to delete this entire budget period planning cycle?')) {
        const txs = getTransactions();
        const periods = getBudgetPeriods(txs);
        const period = periods.find(p => p.id === periodId);
        if (period) {
          const idsToDelete = period.settings.map(s => s.id);
          databaseArray = databaseArray.map(record =>
            idsToDelete.includes(record.id) ? { ...record, deleted: true, updatedAt: Date.now() } : record
          );
          updateDataState(databaseArray, true);
          scheduleCloudSync();

          state.activeBudgetPeriodId = null;
          render();
        }
      }
    }

    // --- Transactions Filtering Actions ---
    function updateTxTableFiltered() {
      const container = document.getElementById('tx-table-body');
      if (!container) return;

      const config = getConfig();
      const txs = getTransactions();

      // Perform Filtering on Transactions
      const filteredTxs = txs.filter(t => {
        const tNotes = t.notes || '';
        const tCat = t.category || '';
        const tSub = t.subcategory || '';
        const tAmt = t.amount !== null ? String(t.amount) : '';
        const matchesSearch = (tNotes + tCat + tSub + tAmt).toLowerCase().includes(state.txSearch.toLowerCase());

        const matchesCat = state.txFilterCat === 'All' || t.category === state.txFilterCat;
        const matchesSub = state.txFilterSub === 'All' || t.subcategory === state.txFilterSub;

        const tTime = t.parsedDate ? t.parsedDate.getTime() : null;
        const startTime = state.txDateStart ? parseISODateString(state.txDateStart).getTime() : null;
        const endTime = state.txDateEnd ? parseISODateString(state.txDateEnd).getTime() : null;
        const matchesDate = (!startTime || (tTime && tTime >= startTime)) && (!endTime || (tTime && tTime <= endTime));

        return matchesSearch && matchesCat && matchesSub && matchesDate;
      });

      let rowsHtml = '';
      if (filteredTxs.length === 0) {
        rowsHtml = `
          <tr>
            <td colspan="6" class="no-results">
              <div style="font-size: 2rem;">${getIconSVG('Search', 36, 1.5)}</div>
              <p>No matching transactions found</p>
              <span style="font-size: 0.75rem; color: var(--slate-400);">Try adjusting your search filters or add a new transaction.</span>
            </td>
          </tr>
        `;
      } else {
        filteredTxs.forEach(t => {
          const isIncome = t.category === 'Income';
          rowsHtml += `
            <tr class="group hover:bg-slate-50 transition-colors">
              <td style="text-align: center; overflow: visible;">
                <div style="display: inline-flex; gap: 0.25rem; align-items: center; justify-content: center;">
                  <button class="tx-action-btn edit" title="Edit" onclick="openEditTransaction('${t.id}')">
                    ${getIconSVG('Edit3', 16, 2)}
                  </button>
                  <button class="tx-action-btn delete" title="Delete" onclick="deleteTransactionDirect('${t.id}')">
                    ${getIconSVG('Trash2', 16, 2)}
                  </button>
                </div>
              </td>
              <td>${t.parsedDate ? formatDate(t.parsedDate) : '-'}</td>
              <td><span class="cat-badge ${t.category}">${t.category}</span></td>
              <td style="font-weight: 700; color: var(--slate-800);">${t.subcategory}</td>
              <td class="tx-amount ${isIncome ? 'positive' : 'negative'}">
                ${formatMoney(t.amount, config.currency)}
              </td>
              <td style="color: var(--slate-400);">${t.notes || '-'}</td>
            </tr>
          `;
        });
      }

      container.innerHTML = rowsHtml;
    }

    function updateTxFilterSearch(val) {
      state.txSearch = val;
      updateTxTableFiltered();
    }

    function updateTxFilterCat(val) {
      state.txFilterCat = val;
      state.txFilterSub = 'All';

      // Direct DOM update of subcategories select
      const subSelect = document.getElementById('tx-filter-sub-select');
      if (subSelect) {
        const subsMap = getSubcategories();
        let subOptions = '<option value="All">All Subcategories</option>';
        if (val !== 'All' && subsMap[val]) {
          subsMap[val].forEach(s => {
            subOptions += `<option value="${s.name}">${s.name}</option>`;
          });
        } else {
          const allUniqueSubs = [];
          Object.values(subsMap).forEach(list => {
            list.forEach(s => {
              if (!allUniqueSubs.includes(s.name)) allUniqueSubs.push(s.name);
            });
          });
          allUniqueSubs.sort().forEach(sub => {
            subOptions += `<option value="${sub}">${sub}</option>`;
          });
        }
        subSelect.innerHTML = subOptions;
      }

      updateTxTableFiltered();
    }

    function updateTxFilterSub(val) {
      state.txFilterSub = val;
      updateTxTableFiltered();
    }

    function updateTxFilterDateStart(val) {
      state.txDateStart = val;
      const dateEndEl = document.getElementById('tx-filter-date-end');
      if (dateEndEl) {
        dateEndEl.min = val;
      }
      updateTxTableFiltered();
    }

    function updateTxFilterDateEnd(val) {
      state.txDateEnd = val;
      updateTxTableFiltered();
    }

    function clearAllTxFilters() {
      state.txDateStart = '';
      state.txDateEnd = '';
      state.txFilterCat = 'All';
      state.txFilterSub = 'All';
      state.txSearch = '';

      // Update form values in DOM directly if present
      const searchEl = document.getElementById('tx-search-field');
      if (searchEl) searchEl.value = '';

      const startEl = document.getElementById('tx-filter-date-start');
      if (startEl) startEl.value = '';

      const endEl = document.getElementById('tx-filter-date-end');
      if (endEl) {
        endEl.value = '';
        endEl.removeAttribute('min');
      }

      const catEl = document.getElementById('tx-filter-cat-select');
      if (catEl) catEl.value = 'All';

      const subEl = document.getElementById('tx-filter-sub-select');
      if (subEl) {
        const subsMap = getSubcategories();
        let subOptions = '<option value="All">All Subcategories</option>';
        const allUniqueSubs = [];
        Object.values(subsMap).forEach(list => {
          list.forEach(s => {
            if (!allUniqueSubs.includes(s.name)) allUniqueSubs.push(s.name);
          });
        });
        allUniqueSubs.sort().forEach(sub => {
          subOptions += `<option value="${sub}">${sub}</option>`;
        });
        subEl.innerHTML = subOptions;
        subEl.value = 'All';
      }

      updateTxTableFiltered();
    }

    function deleteTransactionDirect(id) {
      if (confirm('Are you sure you want to delete this ledger transaction record?')) {
        databaseArray = databaseArray.map(record =>
          record.id === id ? { ...record, deleted: true, updatedAt: Date.now() } : record
        );
        updateDataState(databaseArray, true);
        scheduleCloudSync();
      }
    }

    // --- Modal Overlay Controls ---
    function openModal(markup) {
      const windowEl = document.getElementById('modal-window');
      windowEl.innerHTML = markup;
      document.getElementById('modal-overlay').classList.add('active');
      document.body.classList.add('modal-open');
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('active');
      document.body.classList.remove('modal-open');
    }

    // --- Modal CRUD Forms ---

    // A. Add Transaction Modal
    function openAddTransactionModal() {
      const subs = getSubcategories();

      // Category change helper to populate subcategories in modal select
      window.handleModalCategoryChange = function (cat) {
        const subSelect = document.getElementById('modal-tx-sub');
        let options = '';
        if (subs[cat]) {
          subs[cat].forEach(s => {
            options += `<option value="${s.name}">${s.name}</option>`;
          });
        }
        subSelect.innerHTML = options;
      };

      const defaultCat = 'Expense';
      let subOptions = '';
      if (subs[defaultCat]) {
        subs[defaultCat].forEach(s => {
          subOptions += `<option value="${s.name}">${s.name}</option>`;
        });
      }

      const markup = `
        <div class="modal-header">
          <h3 class="modal-title">New Transaction</h3>
          <button class="modal-close-btn" onclick="closeModal()">${getIconSVG('X', 16, 2.5)}</button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <span class="form-label">Transaction Date</span>
            <input type="date" class="form-input" id="modal-tx-date" value="${formatISODate(new Date())}">
          </div>
          
          <div class="form-group">
            <span class="form-label">Category Group</span>
            <select class="form-select" id="modal-tx-cat" onchange="handleModalCategoryChange(this.value)">

            </select>
          </div>
          
          <div class="form-group">
            <span class="form-label">Subcategory</span>
            <select class="form-select" id="modal-tx-sub">
              ${subOptions}
            </select>
          </div>
          
          <div class="form-group">
            <span class="form-label">Amount (${getConfig().currency})</span>
            <input type="number" step="0.01" class="form-input hide-spin-buttons" id="modal-tx-amt" placeholder="0.00">
          </div>
          
          <div class="form-group">
            <span class="form-label">Notes / Description</span>
            <textarea class="form-textarea" id="modal-tx-notes" placeholder="Any details..."></textarea>
          </div>
          
          <div class="form-actions">
            <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary" onclick="submitAddTransaction()">Add Transaction</button>
          </div>
        </div>

      openModal(markup);

    function submitAddTransaction() {
      const dateVal = document.getElementById('modal-tx-date').value;
      const catVal = document.getElementById('modal-tx-cat').value;
      const subVal = document.getElementById('modal-tx-sub').value;
      const amtVal = parseFloat(document.getElementById('modal-tx-amt').value) || 0;
      const notesVal = document.getElementById('modal-tx-notes').value.trim();

      if (!dateVal) {
        alert('Please fill out the date');
        return;
      }

      if (amtVal === 0) {
        alert('Amount must be non-zero');
        return;
      }

      const now = Date.now();
      const newRecord = {
        id: "tx_" + now.toString(36) + "_" + Math.random().toString(36).substr(2, 5),
        table: "transactions",
        updatedAt: now,
        deleted: false,
        data: {
          date: dateVal,
          category: catVal,
          subcategory: subVal,
          amount: amtVal,
          notes: notesVal
        },
        updatedKeys: {
          date: now,
          category: now,
          subcategory: now,
          amount: now,
          notes: now
        }
      };

      databaseArray.push(newRecord);
      updateDataState(databaseArray, true);
      scheduleCloudSync();

      closeModal();
    }

    // B. Edit Transaction Modal
    function openEditTransaction(id) {
      const record = databaseArray.find(r => r.id === id);
      if (!record) return;

      const subs = getSubcategories();

      window.handleModalCategoryChange = function (cat) {
        const subSelect = document.getElementById('modal-tx-sub');
        let options = '';
        if (subs[cat]) {
          subs[cat].forEach(s => {
            options += `<option value="${s.name}">${s.name}</option>`;
          });
        }
        subSelect.innerHTML = options;
      };

      const currentCat = record.data.category;
      const currentSub = record.data.subcategory;

      let subOptions = '';
      if (subs[currentCat]) {
        subs[currentCat].forEach(s => {
          subOptions += `<option value="${s.name}" ${s.name === currentSub ? 'selected' : ''}>${s.name}</option>`;
        });
      }

      const markup = `
        <div class="modal-header">
          <h3 class="modal-title">Edit Transaction</h3>
          <button class="modal-close-btn" onclick="closeModal()">${getIconSVG('X', 16, 2.5)}</button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <span class="form-label">Transaction Date</span>
            <input type="date" class="form-input" id="modal-tx-date" value="${formatISODate(parseCellDate(record.data.date))}">
          </div>
          
          <div class="form-group">
            <span class="form-label">Category Group</span>
            <select class="form-select" id="modal-tx-cat" onchange="handleModalCategoryChange(this.value)">
              ${CATEGORIES.map(c => `<option value="${c}" ${c === currentCat ? 'selected' : ''}>${c}</option>`).join('')}
            </select>
          </div>
          
          <div class="form-group">
            <span class="form-label">Subcategory</span>
            <select class="form-select" id="modal-tx-sub">
              ${subOptions}
            </select>
          </div>

    // Import Timestamp Update Protocol (Rule 5): set updatedAt = Date.now() on all records.
    function importData(event) {
      const file = event.target.files[0];
      if (!file) return;
      event.target.value = '';

      const reader = new FileReader();
      reader.onload = function (e) {
        try {
          const parsed = JSON.parse(e.target.result);
          const now = Date.now();

          if (Array.isArray(parsed) && parsed.length > 0 && parsed[0].hasOwnProperty('id') && parsed[0].hasOwnProperty('table')) {
            // Rule 5: stamp all records with current time so they win conflict resolution
            const importedData = parsed.map(item => {
              const updatedKeys = { ...(item.updatedKeys || getUpdatedKeys(item)) };
              if (item.data) {
                for (const k in item.data) {
                  updatedKeys[k] = now;
                }
              }
              return { ...item, updatedAt: now, updatedKeys };
            });
            const importedIds = new Set(importedData.map(item => item.id));

            // Mark all existing items not in the import file as deleted to wipe them from cloud
            const oldDataDeleted = databaseArray
              .filter(item => !importedIds.has(item.id))
              .map(item => {
                const updatedKeys = { ...(item.updatedKeys || getUpdatedKeys(item)) };
                return { ...item, deleted: true, updatedAt: now, updatedKeys };
              });

            databaseArray = [...importedData, ...oldDataDeleted];
            updateDataState(databaseArray, true);
            scheduleCloudSync();
            render();
            alert('Database restored successfully! ✅');
          } else {
            alert('Import failed: JSON structure is incorrect or uses the old unsupported legacy format.');
          }
        } catch (err) {
          alert('Invalid JSON file. Please make sure the file is not corrupted.');
        }
      };
      reader.readAsText(file);
    }

      // ── Mobile bottom nav bar fix ───────────────────────────────────────────
      // Android 3-button nav bar doesn't set env(safe-area-inset-bottom).
      // We detect the actual bottom gap via visualViewport and write it to
      // --safe-bottom so all scroll areas always clear the nav bar.
      (function applyMobileBottomInset() {
        const root = document.documentElement;
        let lastInset = 0;

        function update() {
          if (!window.visualViewport) return;
          // When keyboard is closed: window.innerHeight - visualViewport.height
          // is the nav bar height. offsetTop accounts for keyboard pushing viewport.
          const gap = window.innerHeight
            - window.visualViewport.height
            - (window.visualViewport.offsetTop || 0);
          // Only treat positive gaps as nav bar (negative = scrolled page offset)
          const inset = Math.max(0, gap);
          if (Math.abs(inset - lastInset) > 2) { // debounce tiny jitter
            lastInset = inset;
            root.style.setProperty('--safe-bottom', inset + 'px');
          }
        }

        // Run on load and on every viewport resize (nav bar show/hide)
        update();
        window.addEventListener('resize', update);
        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', update);
          window.visualViewport.addEventListener('scroll', update);
        }
      })();
      // ────────────────────────────────────────────────────────────────────────

      // Globally prevent scrolling mouse wheel or trackpad from changing focused number values
      document.addEventListener('wheel', (e) => {
        if (e.target.tagName === 'INPUT' && e.target.type === 'number') {
          e.preventDefault();
        }
      }, { passive: false });

      // Sync recurring schedules sidebar height to calendar box height
      // Only applied in the 2-column desktop layout to prevent Android scrollbar artifacts on mobile
      function syncCalendarSidebarHeight() {
        const calBox = document.getElementById('calendar-box');
        const sidebar = document.getElementById('schedules-sidebar');
        if (!calBox || !sidebar) return;
        if (window.innerWidth >= 1201) {
          sidebar.style.maxHeight = calBox.offsetHeight + 'px';
          sidebar.style.overflowY = 'auto';
        } else {
          sidebar.style.maxHeight = '';
          sidebar.style.overflowY = '';
        }
      }
      syncCalendarSidebarHeight();
      window.addEventListener('resize', syncCalendarSidebarHeight);

      // Window resize listener to sync layout state when crossing mobile/tablet boundary
      let lastIsMobileOrTablet = window.innerWidth <= 1024;
      window.addEventListener('resize', () => {
        const isMobileOrTablet = window.innerWidth <= 1024;
        if (isMobileOrTablet !== lastIsMobileOrTablet) {
          lastIsMobileOrTablet = isMobileOrTablet;
          updateSidebarCollapseState();
          render();
        }
      });
    });
  </script>
</body>

</html>
